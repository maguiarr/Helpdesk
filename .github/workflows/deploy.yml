name: Build & Deploy to OpenShift

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: ./backend
            image: helpdesk-backend
          - context: ./frontend
            image: helpdesk-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Log in to OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }}

      - name: Helm dependency update
        run: helm dependency update helm/

      - name: Clean up failed Helm release and orphaned resources
        run: |
          # Remove any failed Helm release history
          RELEASE_EXISTS=$(helm list -n ${{ env.NAMESPACE }} -a --filter '^helpdesk-pro$' -q)
          if [ -n "$RELEASE_EXISTS" ]; then
            STATUS=$(helm status helpdesk-pro -n ${{ env.NAMESPACE }} -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "pending-install" ]; then
              echo "Removing failed Helm release ($STATUS)..."
              helm uninstall helpdesk-pro -n ${{ env.NAMESPACE }} --no-hooks || true
            fi
          fi

          # Delete orphaned PostgreSQL resources so fresh helm install can recreate them
          # PVCs are NOT deleted — PostgreSQL data is preserved
          RESOURCES=(
            "networkpolicy/helpdesk-pro-postgresql"
            "poddisruptionbudget/helpdesk-pro-postgresql"
            "serviceaccount/helpdesk-pro-postgresql"
            "secret/helpdesk-pro-postgresql"
            "service/helpdesk-pro-postgresql-hl"
            "service/helpdesk-pro-postgresql"
            "statefulset/helpdesk-pro-postgresql"
          )
          for res in "${RESOURCES[@]}"; do
            oc delete "$res" -n ${{ env.NAMESPACE }} --ignore-not-found
          done

      - name: Deploy with Helm
        env:
          DOCKERCONFIG: ${{ secrets.GHCR_DOCKERCONFIGJSON }}
        run: |
          python3 -c "
          import os, yaml
          with open('/tmp/ghcr-secret.yaml', 'w') as f:
              yaml.dump({'ghcrSecret': {'dockerconfigjson': os.environ['DOCKERCONFIG']}}, f)
          "
          helm upgrade --install helpdesk-pro helm/ \
            --namespace ${{ env.NAMESPACE }} \
            --values helm/values.yaml \
            --values helm/values.openshift.yaml \
            --values /tmp/ghcr-secret.yaml \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.repository=${{ env.IMAGE_OWNER }}/helpdesk-frontend \
            --set backend.image.repository=${{ env.IMAGE_OWNER }}/helpdesk-backend \
            --set backend.keycloak.authority=https://${{ secrets.KEYCLOAK_HOST }}/realms/helpdesk \
            --set keycloakRoute.host=${{ secrets.KEYCLOAK_HOST }} \
            --wait --timeout 10m
