services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - helpdesk

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/helpdesk
      KC_DB_USERNAME: helpdesk
      KC_DB_PASSWORD: helpdesk123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HOSTNAME: http://localhost:8180
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - helpdesk

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=helpdesk;Username=helpdesk;Password=helpdesk123"
      Keycloak__Authority: http://localhost:8180/realms/helpdesk
      Keycloak__MetadataAddress: http://keycloak:8180/realms/helpdesk/.well-known/openid-configuration
      Keycloak__AuthorizationUrl: http://localhost:8180/realms/helpdesk/protocol/openid-connect/auth
      Keycloak__ClientId: helpdesk-backend
      Keycloak__ClientSecret: backend-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - helpdesk

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - helpdesk

  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_BROWSER_URL: http://localhost:8180
      JENKINS_OIDC_CLIENT_SECRET: jenkins-secret
      DEFAULT_BASE_URL: http://frontend:8080
      JENKINS_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc/jenkins.yaml:/var/jenkins_home/casc_configs/jenkins.yaml:ro
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - helpdesk

volumes:
  pgdata:
  jenkins_home:

networks:
  helpdesk:
    driver: bridge
