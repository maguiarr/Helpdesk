# -- Global
global:
  imagePullSecrets:
    - helpdesk-pro-ghcr-pull-secret

# -- Frontend
frontend:
  image:
    registry: ghcr.io
    repository: your-github-username/helpdesk-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  keycloakRealm: helpdesk
  keycloakClientId: helpdesk-frontend
  route:
    host: ""

# -- Backend
backend:
  image:
    registry: ghcr.io
    repository: your-github-username/helpdesk-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 200m
      memory: 128Mi
  route:
    host: ""
  keycloak:
    authority: ""
    clientId: helpdesk-backend
    clientSecret: backend-secret

# -- Keycloak route
keycloakRoute:
  host: ""

# -- GHCR pull secret
ghcrSecret:
  enabled: true
  dockerconfigjson: ""

# -- PostgreSQL
postgresql:
  image:
    registry: docker.io
    repository: postgres
    tag: "16-alpine"
  auth:
    username: helpdesk
    password: helpdesk123
    database: helpdesk
  primary:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
    persistence:
      size: 1Gi

# -- Keycloak
keycloak:
  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: "25.0"
  auth:
    adminUser: admin
    adminPassword: admin
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  externalDatabase:
    host: helpdesk-pro-postgresql
    port: 5432
    user: helpdesk
    password: helpdesk123
    database: helpdesk
