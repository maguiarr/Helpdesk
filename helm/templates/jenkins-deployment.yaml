{{- if .Values.jenkins.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.jenkins.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jenkins
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jenkins
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.ghcrSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-ghcr-pull-secret
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: jenkins
          image: "{{ .Values.jenkins.image.registry }}/{{ .Values.jenkins.image.repository }}:{{ .Values.jenkins.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
            - containerPort: 50000
              protocol: TCP
              name: agent
          env:
            - name: JAVA_OPTS
              value: "-Xmx384m -Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP=\"sandbox allow-scripts allow-same-origin; default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;\""
            - name: CASC_JENKINS_CONFIG
              value: "/var/jenkins_home/casc_configs/"
            - name: JENKINS_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-jenkins-secret
                  key: oidc-client-secret
            - name: KEYCLOAK_URL
              value: "https://{{ .Values.keycloakRoute.host }}"
            - name: DEFAULT_BASE_URL
              value: "https://{{ .Values.frontend.route.host }}"
            - name: HEALTH_CHECK_URL
              value: "http://{{ .Release.Name }}-backend:8080/healthz"
            - name: JENKINS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-jenkins-secret
                  key: admin-password
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          resources:
            {{- toYaml .Values.jenkins.resources | nindent 12 }}
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: casc-config
              mountPath: /var/jenkins_home/casc_configs
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-jenkins-pvc
        - name: casc-config
          configMap:
            name: {{ .Release.Name }}-jenkins-casc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
{{- end }}
